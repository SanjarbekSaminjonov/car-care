services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - carcare_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        REQUIREMENTS_FILE: production.txt
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    command: >
      sh -c "python infra/scripts/wait_for_postgres.py &&
      python src/manage.py migrate --noinput &&
      gunicorn config.wsgi:application --chdir src --bind 0.0.0.0:8000 --workers ${GUNICORN_WORKERS:-3} --timeout ${GUNICORN_TIMEOUT:-60}"
    volumes:
      - carcare_media_data:/app/var/media
      - carcare_static_data:/app/var/static
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/ready/', timeout=3)\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  bot:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        REQUIREMENTS_FILE: production.txt
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    command: >
      sh -c "python infra/scripts/wait_for_postgres.py &&
      python src/manage.py runbot"
    volumes:
      - carcare_media_data:/app/var/media
    depends_on:
      db:
        condition: service_healthy
      web:
        condition: service_healthy
    restart: unless-stopped

  notification-worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        REQUIREMENTS_FILE: production.txt
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    command: >
      sh -c "python infra/scripts/wait_for_postgres.py &&
      while true; do
      python src/manage.py process_due_notifications --enqueue-reminders --send-telegram --limit ${NOTIFICATION_WORKER_BATCH_SIZE:-100};
      sleep ${NOTIFICATION_WORKER_SLEEP_SECONDS:-60};
      done"
    depends_on:
      db:
        condition: service_healthy
      web:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - carcare_media_data:/var/www/media:ro
      - carcare_static_data:/var/www/static:ro
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped

volumes:
  carcare_postgres_data:
  carcare_media_data:
  carcare_static_data:
